<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Coastal Aircraft — 3D Viewer</title>
  <meta name="description" content="Interactive 3D viewer for Coastal Aircraft mesh models" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/src/style.css" />
</head>

<body>
  <!-- Loading Overlay -->
  <div id="loading-overlay">
    <div class="loader-content">
      <div class="loader-title">Coastal Aircraft</div>
      <div class="loader-subtitle">Loading 3D Model…</div>
      <div class="progress-track">
        <div class="progress-fill" id="progress-fill"></div>
      </div>
      <div class="progress-text" id="progress-text">0%</div>
    </div>
  </div>

  <!-- View Nav Bar -->
  <div id="view-nav">
    <button class="view-btn active" data-view="home">Home</button>
    <button class="view-btn" data-view="ramp">Ramp</button>
    <button class="view-btn" data-view="office">Office</button>
  </div>

  <!-- Visibility Slider Panel (appears for ramp/office) -->
  <div id="slider-panel" class="hidden">
    <div class="slider-title" id="slider-title">Visibility</div>
    <div class="slider-row">
      <label for="vis-slider">Opacity</label>
      <input type="range" id="vis-slider" min="0" max="100" value="0" />
      <span id="vis-value">0%</span>
    </div>
  </div>

  <!-- Dev Mode Toggle -->
  <button id="dev-toggle" title="Toggle Developer Mode">i</button>

  <!-- Dev Panel (hidden by default) -->
  <div id="dev-panel" class="hidden">
    <div class="dev-panel-title">Dev Controls</div>

    <!-- Clicked Mesh -->
    <div class="dev-section">
      <div class="dev-section-title">Clicked Mesh</div>
      <div class="dev-readout" id="dev-mesh-info">Click a mesh…</div>
    </div>

    <!-- Assign to Group -->
    <div class="dev-section">
      <div class="dev-section-title">Assign to Group</div>
      <div class="dev-assign-row">
        <button class="dev-mesh-btn" data-group="ramp">+ Ramp</button>
        <button class="dev-mesh-btn" data-group="office">+ Office</button>
      </div>
    </div>

    <!-- Mesh Groups -->
    <div class="dev-section">
      <div class="dev-section-title">Mesh Groups</div>
      <div class="dev-group">
        <div class="dev-group-label">Ramp</div>
        <div class="dev-mesh-list" id="dev-ramp-list">—</div>
      </div>
      <div class="dev-group">
        <div class="dev-group-label">Office</div>
        <div class="dev-mesh-list" id="dev-office-list">—</div>
      </div>
    </div>

    <!-- Camera -->
    <div class="dev-section">
      <div class="dev-section-title">Camera</div>
      <div class="dev-readout" id="dev-cam-readout" style="font-size:0.58rem; line-height:1.6">Move camera to update
      </div>
      <div class="dev-assign-row" style="margin-top:8px">
        <button class="dev-mesh-btn dev-cam-btn" data-preset="home">Set Home</button>
        <button class="dev-mesh-btn dev-cam-btn" data-preset="ramp">Set Ramp</button>
        <button class="dev-mesh-btn dev-cam-btn" data-preset="office">Set Office</button>
      </div>
    </div>

    <!-- Lighting Controls -->
    <div class="dev-section">
      <div class="dev-section-title">Lighting</div>
      <div class="dev-slider-row">
        <label>Sun</label>
        <input type="range" id="dev-sun" min="0" max="500" value="200" step="10" />
        <span class="dev-slider-val" id="dev-sun-val">2.0</span>
      </div>
      <div class="dev-slider-row">
        <label>Ambient</label>
        <input type="range" id="dev-ambient" min="0" max="100" value="15" step="5" />
        <span class="dev-slider-val" id="dev-ambient-val">0.15</span>
      </div>
      <div class="dev-slider-row">
        <label>Exposure</label>
        <input type="range" id="dev-exposure" min="10" max="300" value="100" step="5" />
        <span class="dev-slider-val" id="dev-exposure-val">1.0</span>
      </div>
      <div class="dev-slider-row">
        <label>Env</label>
        <input type="range" id="dev-env" min="0" max="300" value="120" step="10" />
        <span class="dev-slider-val" id="dev-env-val">1.2</span>
      </div>
    </div>

    <!-- Save (environmental only) -->
    <div class="dev-section">
      <button class="dev-action-btn" id="dev-save">💾 Save Config to main.js</button>
      <div class="dev-readout dev-status" id="dev-save-status"></div>
    </div>
  </div>

  <!-- Canvas container -->
  <div id="canvas-container"></div>

  <script type="module" src="/src/main.js"></script>
</body>

</html>
